name: oracle-amigo-pilot

services:
  postgres:
    image: docker.io/library/postgres:18-alpine
    env_file:
      - ./env/control-plane.example.env
    volumes:
      - postgres-18-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  control-plane:
    build:
      context: ..
      dockerfile: deploy/control-plane.Dockerfile
    image: localhost/oracle-amigo-control-plane:pilot
    env_file:
      - ./env/control-plane.example.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - control-plane-transfers:/app/data/transfers
    ports:
      - "8080:8080"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  admin-portal:
    build:
      context: ..
      dockerfile: deploy/admin-portal.Dockerfile
    image: localhost/oracle-amigo-admin-portal:pilot
    env_file:
      - ./env/admin-portal.example.env
    depends_on:
      - control-plane
    expose:
      - "3398"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3398/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  reverse-proxy:
    image: docker.io/library/caddy:2-alpine
    depends_on:
      - admin-portal
    ports:
      - "8088:8088"
    volumes:
      - ./reverse-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  prometheus:
    image: docker.io/prom/prometheus:v3.7.3
    depends_on:
      - control-plane
      - admin-portal
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: docker.io/grafana/grafana:12.3.0
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro

volumes:
  postgres-18-data:
  control-plane-transfers:
  caddy-data:
  caddy-config:
  prometheus-data:
  grafana-data:
