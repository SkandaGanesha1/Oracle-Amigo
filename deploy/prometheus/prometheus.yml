global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus runs in the same Podman Compose network as these services, so
  # scrape by Compose service DNS names instead of host loopback aliases.
  - job_name: "control-plane"
    static_configs:
      - targets: ["control-plane:8080"]
        labels:
          service: "control-plane"

  - job_name: "admin-portal"
    static_configs:
      - targets: ["admin-portal:3398"]
        labels:
          service: "admin-portal"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
